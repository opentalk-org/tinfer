name: Build and Push Nix Image

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: nixos
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Single-user install: cache-nix-action can't restore over the
      # root-owned /nix of the multi-user installer.
      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v35
        with:
          nix_conf: |
            experimental-features = nix-command flakes ca-derivations
            sandbox = false
            keep-env-derivations = true
            keep-outputs = true

      - name: Cache nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-image-v4-${{ runner.os }}-${{ hashFiles('uv.lock', 'flake.lock', 'flake.nix', '**/pyproject.toml') }}
          restore-prefixes-first-match: nix-image-v4-${{ runner.os }}-
          gc-max-store-size-linux: 16G
          purge: true
          purge-prefixes: nix-image-v4-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Build image
        run: |
          sudo mkdir -p /run/containers
          sudo chmod 0755 /run/containers
          sudo mkdir -p /etc/containers
          echo 'unqualified-search-registries = ["docker.io"]' | sudo tee /etc/containers/registries.conf > /dev/null
          nix build --option sandbox false .#tinfer-server --print-build-logs

      - name: Push to ghcr.io
        run: |
          SHORT="${GITHUB_SHA:0:12}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${SHORT}"
          else
            TAG="${SHORT}"
          fi
          IMAGE="ghcr.io/${{ github.repository }}"

          # --preserve-digests: layers upload uncompressed with the digests
          # from layers.json, so unchanged layers skip without local state.
          nix run \
            --option sandbox false \
            .#tinfer-server.copyTo -- \
            --preserve-digests \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "docker://$IMAGE:$TAG"

          echo "Pushed $IMAGE:$TAG" >> $GITHUB_STEP_SUMMARY
