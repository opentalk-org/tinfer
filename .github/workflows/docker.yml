name: Build and Push Nix Image

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: nixos
    permissions:
      contents: read
      packages: write
      actions: write

    env:
      NIX_CONFIG: |
        sandbox = false
        keep-env-derivations = true
        keep-outputs = true
      CONTAINERS_REGISTRIES_CONF: ${{ runner.temp }}/registries.conf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          echo 'unqualified-search-registries = ["docker.io"]' > "$CONTAINERS_REGISTRIES_CONF"
          nix build .#tinfer-server --print-build-logs

      - name: Push to ghcr.io
        run: |
          SHORT="${GITHUB_SHA:0:12}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${SHORT}"
          else
            TAG="${SHORT}"
          fi
          IMAGE="ghcr.io/${{ github.repository }}"

          # --preserve-digests: layers upload uncompressed with the digests
          # from layers.json, so unchanged layers skip without local state.
          nix run \
            .#tinfer-server.copyTo -- \
            --preserve-digests \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "docker://$IMAGE:$TAG"

          echo "Pushed $IMAGE:$TAG" >> $GITHUB_STEP_SUMMARY
