<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tinfer realtime highlight</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <section class="toolbar" aria-label="Connection settings">
      <label>
        <span>Protocol</span>
        <select id="protocol">
          <option value="grpc">gRPC</option>
          <option value="websocket">WebSocket</option>
        </select>
      </label>
      <label>
        <span>Mode</span>
        <select id="mode"></select>
      </label>
      <label>
        <span>API host</span>
        <input id="host" value="localhost" autocomplete="off" spellcheck="false">
      </label>
      <label>
        <span>Port</span>
        <input id="port" value="50051" inputmode="numeric" autocomplete="off">
      </label>
      <label>
        <span>Model</span>
        <select id="model"></select>
      </label>
      <label>
        <span>Voice</span>
        <select id="voice"></select>
      </label>
      <label>
        <span>Highlight</span>
        <select id="granularity">
          <option value="word">Word</option>
          <option value="char">Character</option>
        </select>
      </label>
    </section>

    <section class="toolbar voice-settings" aria-label="Voice settings">
      <label>
        <span>Alpha</span>
        <input id="alpha" type="number" min="0" max="1" step="0.05" value="0.3" inputmode="decimal" autocomplete="off">
      </label>
      <label>
        <span>Beta</span>
        <input id="beta" type="number" min="0" max="1" step="0.05" value="0.7" inputmode="decimal" autocomplete="off">
      </label>
      <label>
        <!-- speaking rate: >1 = faster (shorter audio), <1 = slower -->
        <span>Speed</span>
        <input id="speed" type="number" min="0.5" max="2" step="0.05" value="1" inputmode="decimal" autocomplete="off">
      </label>
      <label>
        <!-- WS generation_config.chunk_length_schedule: comma-separated char counts -->
        <span>Chunk schedule</span>
        <input id="schedule" value="120,160,250,290" autocomplete="off" spellcheck="false">
      </label>
    </section>

    <section class="compose" aria-label="Text to speech">
      <textarea id="text" spellcheck="true">To jest krótki test podświetlania aktualnie wypowiadanego słowa w czasie rzeczywistym.</textarea>
      <div class="actions">
        <button id="send" type="button">Send</button>
        <button id="cancel" type="button">Cancel</button>
        <button id="save" type="button" disabled>Save WAV</button>
        <div class="metric">
          <span>First byte</span>
          <strong id="first-byte">-</strong>
        </div>
        <div class="metric">
          <span>Status</span>
          <strong id="status">Idle</strong>
        </div>
      </div>
      <div class="actions stream-controls" id="stream-controls">
        <input id="chunk" placeholder="Live text chunk…" autocomplete="off" spellcheck="false">
        <button id="send-chunk" type="button">Send chunk</button>
        <button id="force" type="button">Force</button>
        <button id="end" type="button">End</button>
      </div>
    </section>

    <section class="viz" aria-label="Audio timeline">
      <div class="track" id="track">
        <p class="track-empty">Audio chunks appear here as they arrive.</p>
      </div>
    </section>

    <section class="reader" aria-label="Spoken text">
      <div id="highlight" class="highlight"></div>
    </section>
  </main>

  <script src="./renderer.js"></script>
</body>
</html>
