[project]
name = "src"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"

[tool.uv.workspace]
members = ["server", "tinfer", "tinfer/espeak_align"]

[tool.uv.sources]
espeak_align = { workspace = true }
torch = [{ index = "pytorch-cu128", marker = "sys_platform == 'linux'" }]
torchaudio = [{ index = "pytorch-cu128", marker = "sys_platform == 'linux'" }]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[dependency-groups]
heavy = [
    "torch==2.10.0",
    "torchaudio==2.10.0",
    "tensorrt-cu12",
    "onnx==1.22.0",
]
